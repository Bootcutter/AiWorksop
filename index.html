<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop — Product Catalogue</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Product Catalogue</h1>
      <p class="subtitle">AI Workshop demo — .NET 9 API + Vanilla JS</p>
    </div>
  </header>

  <main class="container" id="main">
    <search role="search" class="search-bar" aria-label="Search products">
      <label for="search-input" class="search-bar__label">Search products</label>
      <input
        type="search"
        id="search-input"
        class="search-bar__input"
        placeholder="e.g. keyboard, monitor…"
        autocomplete="off"
        spellcheck="false"
      />
    </search>

    <p id="result-count" class="result-count" aria-live="polite" aria-atomic="true"></p>

    <section aria-label="Product list">
      <div id="product-grid" class="product-grid" role="list" aria-live="polite" aria-busy="true">
        <!-- Cards are injected by app.js -->
      </div>
      <p id="error-message" class="error-message" hidden></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>AI Workshop 2 &mdash; <time datetime="2026">2026</time></p>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
